name: Reforma Bot

on:
  push:
    branches: [master]
  schedule:
    # Polling ida 6:00-8:00 AM CDMX (Lun-Vie)
    - cron: "*/5 6-8 * * 1-5"
      timezone: "America/Mexico_City"
    # Resumen diario 7:45 AM CDMX — tramo ida (Lun-Vie)
    - cron: "45 7 * * 1-5"
      timezone: "America/Mexico_City"
    # Polling vuelta 4:00-6:00 PM CDMX (Lun-Vie)
    - cron: "*/5 16-18 * * 1-5"
      timezone: "America/Mexico_City"
    # Resumen vespertino 4:45 PM CDMX — tramo vuelta (Lun-Vie)
    - cron: "45 16 * * 1-5"
      timezone: "America/Mexico_City"
  workflow_dispatch:
    inputs:
      direction:
        description: "ida | vuelta | auto"
        required: false
        default: "auto"
      force:
        description: "digest | poll | manual"
        required: false
        default: "manual"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Run job
        if: github.event_name != 'push'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          JOB_DIRECTION: ${{ github.event.inputs.direction || 'auto' }}
          JOB_FORCE: ${{ github.event.inputs.force || '' }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: npm run job

      - name: Persist state
        if: github.event_name != 'push'
        run: |
          git config user.name "reforma-bot"
          git config user.email "41898282+reforma-bot[bot]@users.noreply.github.com"
          git add data/state.json
          git diff --staged --quiet || git commit -m "chore: update state [skip ci]"
          git push
